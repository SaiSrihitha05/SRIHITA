<section
  class="min-h-screen bg-[#f5f2ef] dark:bg-gray-900 flex items-center justify-center px-4 transition-colors duration-300 mt-12">
  <div class="max-w-md w-full bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8 transition-colors duration-300 mb-10">
    <div class="text-center mb-8">
      <h2 class="text-3xl font-bold text-[#75013f] dark:text-pink-300">Welcome Back</h2>
      <p class="text-gray-500 dark:text-gray-400 mt-2">Log in to manage your Hartford policies</p>
    </div>

    <!-- Error Message -->
    <div *ngIf="errorMessage"
      class="mb-4 p-4 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-700 rounded-lg text-red-600 dark:text-red-400">
      {{ errorMessage }}
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onLogin()" class="space-y-4">
      <div>
        <label class="block text-[#75013f] dark:text-pink-200 font-semibold mb-1">Email</label>
        <input type="email" formControlName="email" placeholder="Enter your email"
          class="w-full px-4 py-3 rounded-xl border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white dark:placeholder-gray-400 focus:border-[#75013f] dark:focus:border-pink-500 outline-none transition-all"
          [class.border-red-500]="submitted && email?.invalid">
        <div *ngIf="submitted && email?.invalid" class="text-red-500 text-sm mt-1">
          <div *ngIf="email?.errors?.['required']">Email is required</div>
          <div *ngIf="email?.errors?.['pattern']">Invalid email format</div>
        </div>
      </div>
      <div>
        <label class="block text-[#75013f] dark:text-pink-200 font-semibold mb-1">Password</label>
        <input type="password" formControlName="password" placeholder="••••••••"
          class="w-full px-4 py-3 rounded-xl border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white dark:placeholder-gray-400 focus:border-[#75013f] dark:focus:border-pink-500 outline-none transition-all"
          [class.border-red-500]="submitted && password?.invalid">
        <div *ngIf="submitted && password?.invalid" class="text-red-500 text-sm mt-1">
          <div *ngIf="password?.errors?.['required']">Password is required</div>
          <div *ngIf="password?.errors?.['minlength']">Password must be at least 6 characters</div>
        </div>
      </div>
      <div class="text-right">
        <a routerLink="/forgot-password" class="text-[10px] text-[#75013f] font-black 
            uppercase tracking-widest hover:underline">
          Forgot Password?
        </a>
      </div>
      <div
        class="flex items-center justify-between bg-slate-100 dark:bg-gray-900/50 p-1 rounded-xl border border-slate-200 dark:border-gray-700">
        <div
          class="font-mono text-xl font-black italic tracking-[0.3em] text-slate-700 dark:text-slate-200 line-through select-none decoration-4 decoration-[#75013f]/40">
          {{ captchaCode }}
        </div>
        <button type="button" (click)='loadCaptcha()'
          class="w-10 h-10 flex items-center justify-center bg-white dark:bg-gray-800 rounded-xl shadow-sm hover:bg-slate-50 transition-all text-lg">
          🔄
        </button>
      </div>

      <div class="space-y-1">
        <input type="text" formControlName="captcha" placeholder="Enter code above" maxlength="6"
          class="w-full px-3 py-3 rounded-xl border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white outline-none focus:border-[#75013f] font-italic text-center tracking-widest"
          [class.border-red-500]="submitted && captcha?.invalid">
        <div *ngIf="submitted && captcha?.invalid" class="text-red-500 text-xs font-bold uppercase mt-1">
          Security code is required
        </div>
      </div>

      <button type="submit" [disabled]="submitted && loginForm.invalid"
        class="w-full py-3 bg-[#75013f] dark:bg-pink-700 text-white rounded-xl font-bold hover:bg-[#fe3082] dark:hover:bg-pink-600 transition-all shadow-md disabled:opacity-50 disabled:cursor-not-allowed">
        Login
      </button>
    </form>

    <p class="text-center mt-6 text-gray-600 dark:text-gray-400">
      Don't have an account?
      <a routerLink="/register" class="text-[#fe3082] dark:text-pink-400 font-bold hover:underline">Register here</a>
    </p>
  </div>
</section>
