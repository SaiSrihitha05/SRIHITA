<!-- Personal Authorized Profile for Claims Officers -->
<div class="p-8 font-lato max-w-4xl mx-auto" *ngIf="!loading">
  <div class="mb-8 transition-colors">
    <h1 class="text-3xl font-bold text-[#75013f] dark:text-pink-300">Account Settings</h1>
    <p class="text-gray-500 dark:text-gray-400">Manage your Claims Officer credentials and contact details</p>
  </div>

  <div
    class="bg-white dark:bg-gray-800 rounded-3xl shadow-sm border border-gray-100 dark:border-gray-700 overflow-hidden transition-all duration-300">
    <!-- Visual Branding Header -->
    <div class="h-32 bg-gradient-to-r from-[#75013f] to-[#3b001f] dark:from-gray-900 dark:to-gray-800 relative">
      <div
        class="absolute -bottom-12 left-8 w-24 h-24 bg-white dark:bg-gray-800 rounded-2xl shadow-lg border-4 border-[#f5f2ef] dark:border-gray-700 flex items-center justify-center text-[#75013f] dark:text-pink-400 text-3xl font-bold transition-all">
        {{ profile.name?.charAt(0) }}
      </div>
    </div>

    <div class="pt-16 p-8">
      <div class="flex justify-between items-center mb-8">
        <div>
          <h2 class="text-2xl font-bold text-gray-800 dark:text-gray-100 transition-colors">{{ profile.name }}</h2>
          <div class="flex items-center gap-2 mt-1">
            <span class="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></span>
            <p class="text-xs text-gray-500 dark:text-gray-400 font-bold uppercase tracking-widest">Claims Officer | ID:
              {{ profile.id }}</p>
          </div>
        </div>
        <button (click)="isEditing = !isEditing"
          class="px-6 py-2 rounded-xl border-2 border-[#75013f] dark:border-pink-500 text-[#75013f] dark:text-pink-400 font-bold hover:bg-[#75013f] dark:hover:bg-pink-700 hover:text-white transition-all shadow-md active:scale-95">
          {{ isEditing ? 'Cancel' : 'Edit Profile' }}
        </button>
      </div>

      <form (ngSubmit)="onUpdate()" class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="space-y-1">
          <label class="text-xs font-bold text-[#75013f] dark:text-pink-400 uppercase">Full Name</label>
          <input name="name" [(ngModel)]="profile.name" [disabled]="!isEditing"
            class="w-full p-3 rounded-xl border border-gray-200 dark:border-gray-700 dark:bg-gray-900 dark:text-gray-100 focus:border-[#75013f] dark:focus:border-pink-500 outline-none disabled:bg-gray-100 dark:disabled:bg-gray-900 disabled:cursor-not-allowed transition-all">
        </div>

        <div class="space-y-1">
          <label class="text-xs font-bold text-[#75013f] dark:text-pink-400 uppercase">Phone Number</label>
          <input name="phone" [(ngModel)]="profile.phone" [disabled]="!isEditing"
            class="w-full p-3 rounded-xl border border-gray-200 dark:border-gray-700 dark:bg-gray-900 dark:text-gray-100 focus:border-[#75013f] dark:focus:border-pink-500 outline-none disabled:bg-gray-100 dark:disabled:bg-gray-900 disabled:cursor-not-allowed transition-all">
        </div>

        <div class="md:col-span-2 space-y-1">
          <label class="text-xs font-bold text-gray-400 dark:text-gray-500 uppercase">Registered Email</label>
          <div
            class="flex items-center gap-3 w-full p-3 rounded-xl border border-gray-100 dark:border-gray-700 bg-gray-50 dark:bg-gray-900/50 text-gray-400 dark:text-gray-500 transition-colors">
            <span class="text-sm">🔒</span>
            <span class="text-sm font-medium">{{ profile.email }}</span>
          </div>
          <p class="text-[10px] text-gray-400 dark:text-gray-500 italic">Email cannot be changed as it is linked to your
            settlement authority.</p>
        </div>

        <div class="md:col-span-2 pt-4" *ngIf="isEditing">
          <button type="submit"
            class="w-full py-4 bg-[#75013f] dark:bg-pink-700 text-white rounded-2xl font-bold hover:bg-[#fe3082] dark:hover:bg-pink-600 transition-all shadow-lg shadow-[#75013f]/20 active:scale-95">
            Save Account Changes
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
