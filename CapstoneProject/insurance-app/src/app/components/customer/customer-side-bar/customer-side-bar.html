<aside
  class="w-64 h-full bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 flex flex-col transition-colors duration-300 overflow-y-auto">
  <div class="p-6 border-b border-gray-50 dark:border-gray-700">
    <p class="text-[10px] font-bold text-[#75013f] dark:text-pink-300 uppercase tracking-widest">Customer Portal</p>
    <p class="text-xs text-gray-400 dark:text-gray-500">Manage your protection</p>
  </div>

  <div class="flex-1 py-6 px-4">
    <nav class="space-y-2">
<a *ngFor="let link of navLinks"
   [routerLink]="link.path"
   routerLinkActive="bg-[#75013f] text-white"
   [routerLinkActiveOptions]="{exact: true}"
   #rla="routerLinkActive"
   class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all group hover:bg-[#75013f]/10 dark:hover:bg-gray-700">
        <span class="text-xl group-hover:scale-110 transition-transform">
          {{ link.icon }}
        </span>

<span
  class="font-lato font-bold block"
  [ngClass]="rla.isActive 
    ? 'text-white' 
    : 'text-gray-900 dark:text-gray-200 group-hover:text-[#75013f] dark:group-hover:text-pink-300'">
  {{ link.label }}
</span>
      </a>
    </nav>
  </div>

</aside>
