<div class="min-h-screen bg-[#f5f2ef] flex items-center 
            justify-center font-lato px-4">
  <div class="w-full max-w-md space-y-8">

    <div class="text-center">
      <h1 class="text-3xl font-black text-[#75013f]">Hartford Life Connect</h1>
      <p class="text-gray-400 text-xs uppercase tracking-widest mt-2 font-bold">
        Account Recovery
      </p>
    </div>

    <div class="bg-white rounded-[3rem] shadow-2xl p-10 space-y-6">

      <!-- Form View -->
      <div *ngIf="!success" class="space-y-6">
        <div>
          <h2 class="text-2xl font-black text-gray-800">Forgot Password?</h2>
          <p class="text-gray-400 text-sm mt-1">
            Enter your registered email to continue.
          </p>
        </div>

        <!-- Error -->
        <div *ngIf="error"
             class="p-4 bg-red-50 border border-red-100 rounded-2xl">
          <p class="text-red-500 text-xs font-bold">⚠️ {{ error }}</p>
        </div>

        <!-- Email -->
        <div class="space-y-2">
          <label class="text-[10px] font-black text-gray-400 
                        uppercase tracking-widest">
            Registered Email
          </label>
          <input [(ngModel)]="email"
                 type="email"
                 placeholder="you@example.com"
                 class="w-full p-4 bg-[#f5f2ef] rounded-2xl border-none 
                        outline-none focus:ring-2 focus:ring-[#75013f]/20"/>
        </div>

        <button (click)="submit()"
                [disabled]="loading || !email"
                class="w-full py-5 bg-[#75013f] text-white rounded-2xl 
                       font-black text-xs uppercase tracking-widest shadow-xl
                       hover:bg-[#3b001f] disabled:opacity-40 transition-all">
          {{ loading ? 'Verifying...' : 'Continue →' }}
        </button>

        <p class="text-center text-xs text-gray-400">
          Remember your password?
          <a routerLink="/login"
             class="text-[#75013f] font-black hover:underline ml-1">
            Back to Login
          </a>
        </p>
      </div>

      <!-- Success View -->
      <div *ngIf="success" class="text-center space-y-4 py-4">
        <div class="w-16 h-16 bg-green-50 text-green-500 rounded-full flex items-center justify-center mx-auto text-2xl">
          ✓
        </div>
        <h2 class="text-xl font-black text-gray-800">Check Your Email</h2>
        <p class="text-gray-400 text-sm leading-relaxed px-2">
          We've sent a password reset link to <br>
          <strong class="text-gray-800">{{email}}</strong>. <br>
          Please check your inbox to proceed.
        </p>
        <div class="pt-4">
          <a routerLink="/login" class="text-[#75013f] font-black text-xs uppercase tracking-widest hover:underline">
            ← Return to Login
          </a>
        </div>
      </div>

    </div>
  </div>
</div>
