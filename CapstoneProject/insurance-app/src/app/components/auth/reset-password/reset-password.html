<div class="min-h-screen bg-[#f5f2ef] flex items-center 
            justify-center font-lato px-4">
  <div class="w-full max-w-md space-y-8">

    <div class="text-center">
      <h1 class="text-3xl font-black text-[#75013f]">Hartford Life Connect</h1>
      <p class="text-gray-400 text-xs uppercase tracking-widest mt-2 font-bold">
        Reset Password
      </p>
    </div>

    <!-- Success State -->
    <div *ngIf="success"
         class="bg-white rounded-[3rem] shadow-2xl p-10 text-center space-y-4">
      <div class="text-6xl">✅</div>
      <h2 class="text-2xl font-black text-green-600">Password Reset!</h2>
      <p class="text-gray-400 text-sm">
        Redirecting you to login...
      </p>
    </div>

    <!-- Form -->
    <div *ngIf="!success"
         class="bg-white rounded-[3rem] shadow-2xl p-10 space-y-6">

      <div>
        <h2 class="text-2xl font-black text-gray-800">Set New Password</h2>
        <p class="text-gray-400 text-sm mt-1">
          Choose a strong password for your account.
        </p>
      </div>

      <!-- Error -->
      <div *ngIf="error"
           class="p-4 bg-red-50 border border-red-100 rounded-2xl">
        <p class="text-red-500 text-xs font-bold">⚠️ {{ error }}</p>
      </div>

      <!-- New Password -->
      <div class="space-y-2">
        <label class="text-[10px] font-black text-gray-400 
                      uppercase tracking-widest">
          New Password
        </label>
        <div class="relative">
          <input [(ngModel)]="newPassword"
                 [type]="showPassword ? 'text' : 'password'"
                 placeholder="Min. 6 characters"
                 class="w-full p-4 bg-[#f5f2ef] rounded-2xl border-none 
                        outline-none focus:ring-2 focus:ring-[#75013f]/20 pr-16"/>
          <button (click)="showPassword = !showPassword"
                  class="absolute right-4 top-1/2 -translate-y-1/2 
                         text-gray-400 text-xs font-bold">
            {{ showPassword ? 'Hide' : 'Show' }}
          </button>
        </div>
      </div>

      <!-- Confirm Password -->
      <div class="space-y-2">
        <label class="text-[10px] font-black text-gray-400 
                      uppercase tracking-widest">
          Confirm Password
        </label>
        <input [(ngModel)]="confirmPassword"
               type="password"
               placeholder="Re-enter new password"
               class="w-full p-4 bg-[#f5f2ef] rounded-2xl border-none 
                      outline-none focus:ring-2 focus:ring-[#75013f]/20"/>
        <p *ngIf="confirmPassword && newPassword !== confirmPassword"
           class="text-[10px] text-red-500 font-bold">
          ⚠️ Passwords do not match
        </p>
        <p *ngIf="confirmPassword && newPassword === confirmPassword"
           class="text-[10px] text-green-500 font-bold">
          ✓ Passwords match
        </p>
      </div>

      <button (click)="submit()"
              [disabled]="loading || !newPassword || 
                          !confirmPassword || newPassword !== confirmPassword"
              class="w-full py-5 bg-[#75013f] text-white rounded-2xl 
                     font-black text-xs uppercase tracking-widest shadow-xl
                     hover:bg-[#3b001f] disabled:opacity-40 transition-all">
        {{ loading ? 'Resetting...' : 'Reset Password' }}
      </button>

      <p class="text-center text-xs text-gray-400">
        <a routerLink="/login"
           class="text-[#75013f] font-black hover:underline">
          ← Back to Login
        </a>
      </p>

    </div>
  </div>
</div>
