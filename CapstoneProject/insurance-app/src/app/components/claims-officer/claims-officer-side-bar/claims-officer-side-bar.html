<aside
    class="w-64 h-full bg-[#f5f2ef] border-[#f5f2ef] shadow-lg shadow-pink-900/20 dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 flex flex-col transition-colors overflow-y-auto">
    <div class="flex-1 py-6 px-4">
        <nav class="space-y-2">
            <a *ngFor="let link of navLinks" [routerLink]="link.path"
                routerLinkActive="bg-[#75013f] text-white dark:bg-pink-700 shadow-lg shadow-pink-900/20"
                [routerLinkActiveOptions]="{exact: true}"
                class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all group hover:bg-[#75013f]/10 dark:hover:bg-pink-900/20">

                <span class="text-xl group-hover:scale-110 transition-transform">
                    {{ link.icon }}
                </span>

                <span class="font-lato font-bold text-inherit block transition-colors flex-1">
                    {{ link.label }}
                </span>

                <!-- Badge for Chat Requests -->
                <span *ngIf="link.label === 'Chat Requests' && pendingCount() > 0"
                    class="bg-[#fe3082] text-white text-[10px] font-bold px-2 py-0.5 rounded-full shadow-sm animate-pulse">
                    {{ pendingCount() }}
                </span>
            </a>
        </nav>
    </div>

</aside>
